version: '3.9'

# =====================================================================
# Smart Campus Utility Hub – Docker Compose
# One-command local development stack
#
# Usage:
#   docker compose up --build
#
# Services:
#   db        – PostgreSQL 15 database
#   backend   – Node.js / Express API  (http://localhost:5000)
#   frontend  – Vite / React dev server (http://localhost:5173)
# =====================================================================

services:

  # -------------------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: smart_campus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-smart_campus_unified}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically initialize the database on first run
      - ./smart-campus-backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-smart_campus_unified}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart_campus_network

  # -------------------------------------------------------------------
  # Backend API (Node.js / Express)
  # -------------------------------------------------------------------
  backend:
    build:
      context: ./smart-campus-backend
      dockerfile: Dockerfile
      target: runtime
    container_name: smart_campus_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./smart-campus-backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - smart_campus_network

  # -------------------------------------------------------------------
  # Frontend (Vite / Nginx)
  # -------------------------------------------------------------------
  frontend:
    build:
      context: ./smart-campus-frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000/api}
    container_name: smart_campus_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '80:80'
    networks:
      - smart_campus_network

networks:
  smart_campus_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

name: 🐛 Bug Report
description: Report a bug or unexpected behaviour
title: "fix: <short description of the bug>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I click "Submit", the form throws a 500 error instead of saving the event.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Go to '/student/events'
        2. Click "Create Event"
        3. Fill out the form
        4. Click "Submit"
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Paste any relevant screenshots, browser console errors, or server logs here.

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Frontend (UI)
        - Backend (API)
        - Database
        - Authentication
        - Timetable
        - Electives
        - Events & Clubs
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: e.g. 20.11.0

  - type: input
    id: browser
    attributes:
      label: Browser (for UI bugs)
      placeholder: e.g. Chrome 124

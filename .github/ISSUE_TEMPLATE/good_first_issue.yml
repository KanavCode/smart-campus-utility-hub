name: 🌱 Good First Issue
description: A beginner-friendly task to help new contributors get started
title: "chore: <short description of the task>"
labels: ["good first issue", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        👋 Welcome! This template is for creating beginner-friendly issues for NSoC 2026 contributors.
        
        Please provide enough context so that a newcomer can pick up this task without needing prior knowledge of the entire codebase.

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done? Be specific and approachable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Background / Context
      description: Any background information that will help a newcomer understand the task.

  - type: textarea
    id: expected
    attributes:
      label: Expected Outcome
      description: What should the repository/application look like after this task is complete?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to Edit
      description: List the files or directories that need to be modified.
      placeholder: |
        - `smart-campus-frontend/src/pages/Auth.tsx`
        - `smart-campus-backend/src/components/users/user.routes.js`

  - type: textarea
    id: resources
    attributes:
      label: Helpful Resources
      description: Links to docs, examples, or related PRs that might help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Contributor Checklist
      options:
        - label: I have read the [CONTRIBUTING.md](../CONTRIBUTING.md)
          required: false
        - label: I understand the task and the codebase area it touches
          required: false

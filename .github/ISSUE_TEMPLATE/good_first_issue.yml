name: 🌱 Good First Issue
description: A beginner-friendly task to help new contributors get started
title: "chore: <short description of the task>"
labels: ["good first issue", "help wanted", "level1", "nsoc-2026", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        👋 Welcome! This template is for creating beginner-friendly issues for NSoC 2026 contributors.

        NSoC rules for maintainers:
        - This template defaults to `level1` (3 pts).
        - Every NSoC issue must have exactly one difficulty label: `level1` (3), `level2` (5), or `level3` (10).
        - Assign the issue to a contributor before accepting a PR.

        Please provide enough context so that a newcomer can pick up this task without needing prior knowledge of the entire codebase.

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done? Be specific and approachable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Background / Context
      description: Any background information that will help a newcomer understand the task.

  - type: textarea
    id: expected
    attributes:
      label: Expected Outcome
      description: What should the repository/application look like after this task is complete?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to Edit
      description: List the files or directories that need to be modified.
      placeholder: |
        - `smart-campus-frontend/src/pages/Auth.tsx`
        - `smart-campus-backend/src/components/users/user.routes.js`

  - type: textarea
    id: resources
    attributes:
      label: Helpful Resources
      description: Links to docs, examples, or related PRs that might help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Maintainer Checklist
      options:
        - label: I added suitable type and area labels for this issue
          required: true
        - label: This issue has exactly one NSoC level label (default level1 = 3 pts)
          required: true
        - label: I will assign this issue before accepting any PR for it
          required: true
